name: Decompile APK and Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  decompile-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;31.0.0" "platforms;android-33" || true

      - name: Install tools
        run: |
          wget -q https://github.com/pxb1988/dex2jar/releases/download/v2.4/dex-tools-v2.4.zip
          unzip -q dex-tools-v2.4.zip
          chmod +x dex-tools-v2.4/d2j-dex2jar.sh
          sudo apt-get install -y apktool 2>/dev/null || true

      - name: Extract deps from APK
        run: |
          APK_FILE="Virtual_Camera_Live_Assist_V3.5.0 (1).apk"
          mkdir -p apk_contents app/libs app/src/main/jniLibs

          unzip -q "$APK_FILE" -d apk_contents

          mkdir -p /tmp/merged_classes
          for dex in apk_contents/classes*.dex; do
            echo "Converting: $dex"
            ./dex-tools-v2.4/d2j-dex2jar.sh "$dex" -o /tmp/tmp_$(basename $dex .dex).jar --force 2>/dev/null || true
          done

          for jar in /tmp/tmp_*.jar; do
            if [ -f "$jar" ]; then
              cd /tmp/merged_classes && jar xf "$jar" 2>/dev/null || true && cd -
            fi
          done

          cd /tmp/merged_classes
          rm -rf androidx/ android/ com/google/ kotlin/ kotlinx/ org/jetbrains/ org/intellij/ META-INF/ 2>/dev/null || true
          rm -rf okhttp3/ okio/ 2>/dev/null || true
          rm -rf org/osmdroid/ org/metalev/ 2>/dev/null || true
          rm -rf com/tbuonomo/ 2>/dev/null || true
          rm -rf com/airbnb/ com/bumptech/ com/squareup/ retrofit2/ io/reactivex/ org/reactivestreams/ 2>/dev/null || true
          cd -

          cd /tmp/merged_classes && jar cf "$OLDPWD/app/libs/app-deps.jar" . 2>/dev/null || true && cd -
          echo "Cleaned JAR size: $(ls -lh app/libs/app-deps.jar | awk '{print $5}')"

          if [ -d "apk_contents/lib" ]; then
            for abi_dir in apk_contents/lib/*/; do
              abi=$(basename "$abi_dir")
              mkdir -p "app/src/main/jniLibs/$abi"
              cp "$abi_dir"*.so "app/src/main/jniLibs/$abi/" 2>/dev/null || true
            done
          fi

      - name: Extract resources from APK
        run: |
          APK_FILE="Virtual_Camera_Live_Assist_V3.5.0 (1).apk"
          apktool d "$APK_FILE" -o apk_decoded -f 2>/dev/null || true

          # Copy mipmap icons
          for dir in apk_decoded/res/mipmap-*; do
            if [ -d "$dir" ]; then
              density=$(basename "$dir")
              mkdir -p "app/src/main/res/$density"
              cp "$dir"/* "app/src/main/res/$density/" 2>/dev/null || true
            fi
          done

          # Remove duplicate resource files (keep only one format per resource name)
          echo "=== Checking for duplicate resources ==="
          for dir in app/src/main/res/mipmap-*; do
            if [ -d "$dir" ]; then
              # For each base name, keep only one file (prefer png over jpg)
              for png in "$dir"/*.png; do
                base=$(basename "$png" .png)
                if [ -f "$dir/$base.jpg" ]; then
                  echo "Removing duplicate: $dir/$base.jpg (keeping .png)"
                  rm "$dir/$base.jpg"
                fi
              done
              # For each base name, also check webp
              for webp in "$dir"/*.webp; do
                base=$(basename "$webp" .webp)
                if [ -f "$dir/$base.png" ]; then
                  echo "Removing duplicate: $dir/$base.png (keeping .webp)"
                  rm "$dir/$base.png"
                fi
                if [ -f "$dir/$base.jpg" ]; then
                  echo "Removing duplicate: $dir/$base.jpg (keeping .webp)"
                  rm "$dir/$base.jpg"
                fi
              done
            fi
          done

          # If no mipmap resources exist at all, create placeholders
          if ! ls app/src/main/res/mipmap-*/ic_launcher.* 1>/dev/null 2>&1; then
            echo "Creating placeholder launcher icons..."
            for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p "app/src/main/res/mipmap-$density"
              echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwADhQGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > "app/src/main/res/mipmap-$density/ic_launcher.png"
            done
          fi

          echo "=== Final mipmap resources ==="
          find app/src/main/res/mipmap-* -type f 2>/dev/null

      - name: Update settings.gradle
        run: |
          cat > settings.gradle << 'GRADLE'
          include ':app'
          rootProject.name = "VCamera"
          GRADLE

      - name: Update app/build.gradle
        run: |
          cat > app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application'
              id 'kotlin-android'
          }

          android {
              compileSdk rootProject.ext.compileSdkVersion

              defaultConfig {
                  applicationId rootProject.ext.masterPkg
                  minSdkVersion rootProject.ext.minSdkVersion
                  targetSdkVersion rootProject.ext.targetSdkVersion
                  versionCode rootProject.ext.versionCode
                  versionName rootProject.ext.versionName
              }

              buildTypes {
                  debug {
                      minifyEnabled false
                  }
                  release {
                      minifyEnabled false
                  }
              }

              buildFeatures {
                  viewBinding true
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              lintOptions {
                  checkReleaseBuilds false
                  abortOnError false
              }

              packagingOptions {
                  pickFirst 'META-INF/**'
                  pickFirst 'kotlin/**'
              }
          }

          repositories {
              flatDir { dirs 'libs' }
              google()
              mavenCentral()
              maven { url 'https://jitpack.io' }
          }

          dependencies {
              implementation fileTree(dir: "libs", include: ["*.jar", "*.aar"])
              implementation 'com.google.android.material:material:1.3.0'
              implementation 'androidx.core:core-ktx:1.3.2'
              implementation 'androidx.appcompat:appcompat:1.3.0-rc01'
              implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
              implementation "androidx.recyclerview:recyclerview:1.2.0"
              implementation 'androidx.viewpager2:viewpager2:1.0.0'
              implementation "androidx.activity:activity-ktx:1.2.2"
              implementation "androidx.fragment:fragment-ktx:1.3.3"
              implementation "androidx.preference:preference-ktx:1.1.1"
              implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.4.2"
              implementation "androidx.lifecycle:lifecycle-viewmodel-ktx:2.3.1"
              implementation "androidx.lifecycle:lifecycle-livedata-ktx:2.3.1"
              implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.3.1"
              implementation 'com.tbuonomo:dotsindicator:4.2'
              implementation 'org.osmdroid:osmdroid-android:6.1.11'
          }
          GRADLE

      - name: Setup Gradle wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.2'

      - name: Create gradlew
        run: |
          gradle wrapper --gradle-version=7.2
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Find and upload APK
        run: |
          echo "=== All APK files ==="
          find app/build -name "*.apk" 2>/dev/null
          mkdir -p output
          find app/build -name "*.apk" -exec cp {} output/ \;
          ls -lh output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VCamera-debug-apk
          path: output/
          retention-days: 30
          if-no-files-found: warn
