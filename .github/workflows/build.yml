name: Decompile APK and Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  decompile-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;31.0.0" "platforms;android-33" || true

      - name: Install tools (dex2jar + apktool)
        run: |
          wget -q https://github.com/pxb1988/dex2jar/releases/download/v2.4/dex-tools-v2.4.zip
          unzip -q dex-tools-v2.4.zip
          chmod +x dex-tools-v2.4/d2j-dex2jar.sh

          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          echo '#!/bin/bash' > apktool && echo 'java -jar '"$PWD/apktool.jar"' "$@"' >> apktool
          chmod +x apktool && echo "$PWD" >> $GITHUB_PATH

      - name: Decompile APK with apktool (resources)
        run: |
          APK_FILE="Virtual_Camera_Live_Assist_V3.5.0 (1).apk"
          apktool d "$APK_FILE" -o apk_decoded --force-all 2>&1 | tail -5

      - name: Extract classes from APK with dex2jar
        run: |
          APK_FILE="Virtual_Camera_Live_Assist_V3.5.0 (1).apk"
          mkdir -p app/libs app/src/main/jniLibs

          mkdir -p apk_raw
          unzip -q "$APK_FILE" -d apk_raw
          mkdir -p /tmp/merged_classes

          for dex in apk_raw/classes*.dex; do
            echo "Converting: $dex"
            ./dex-tools-v2.4/d2j-dex2jar.sh "$dex" -o /tmp/tmp_$(basename $dex .dex).jar --force 2>/dev/null || true
          done

          for jar in /tmp/tmp_*.jar; do
            [ -f "$jar" ] && cd /tmp/merged_classes && jar xf "$jar" 2>/dev/null || true && cd -
          done

          cd /tmp/merged_classes

          # Remove all Maven/JitPack-resolvable packages (to avoid duplicate classes)
          # Standard Android platform + Google
          rm -rf android/ androidx/ com/google/ META-INF/

          # Kotlin runtime (resolved via MavenCentral)
          rm -rf kotlin/ kotlinx/ org/intellij/ org/jetbrains/

          # MavenCentral-resolvable
          rm -rf com/tbuonomo/           # dotsindicator
          rm -rf org/osmdroid/ org/metalev/  # osmdroid

          # JitPack-resolvable (classes AND attrs.xml provided by AAR)
          rm -rf com/afollestad/          # material-dialogs
          rm -rf com/othershe/            # CornerLabelView
          rm -rf com/Othershe/
          rm -rf com/github/ferfalk/      # SimpleSearchView
          rm -rf com/github/Ferfalk/

          # KEEP in jar (not resolvable via Maven/JitPack):
          # - me/nukc/          stateview (JitPack can't resolve this version)
          # - cbfg/             RVAdapter (gitee maven, uncertain)
          # - com/roger/        catloadinglibrary (JCenter dead)
          # - com/imuxuan/      floatingview (JCenter dead)
          # - virtual/          app own code + camera lib
          # - com/android/      billing, installreferrer

          echo "=== Remaining classes in jar ==="
          find . -name "*.class" | sed 's|./||' | awk -F/ '{print $1"/"$2}' | sort -u

          MERGED_JAR="$OLDPWD/app/libs/all-deps.jar"
          jar cf "$MERGED_JAR" . 2>/dev/null || true
          cd -
          echo "JAR size: $(ls -lh app/libs/all-deps.jar | awk '{print $5}')"

          # Copy native .so libraries
          if [ -d "apk_raw/lib" ]; then
            for abi_dir in apk_raw/lib/*/; do
              abi=$(basename "$abi_dir")
              mkdir -p "app/src/main/jniLibs/$abi"
              cp "$abi_dir"*.so "app/src/main/jniLibs/$abi/" 2>/dev/null || true
            done
            find app/src/main/jniLibs -name "*.so"
          fi

      - name: Copy mipmap icons + create missing attrs
        run: |
          # Copy mipmap (icon) resources from APK
          for mipmap_dir in apk_decoded/res/mipmap-*/; do
            if [ -d "$mipmap_dir" ]; then
              dir_name=$(basename "$mipmap_dir")
              mkdir -p "app/src/main/res/$dir_name"
              cp "$mipmap_dir"* "app/src/main/res/$dir_name/" 2>/dev/null || true
            fi
          done
          echo "Mipmaps: $(ls app/src/main/res/ | grep mipmap | tr '\n' ' ')"

          # Copy assets
          if [ -d "apk_decoded/assets" ]; then
            mkdir -p app/src/main/assets
            cp -rn apk_decoded/assets/. app/src/main/assets/ 2>/dev/null || true
          fi

          # Create attrs.xml for libs kept in jar (stateview, RVAdapter, catloading, floatingview)
          # These attrs are not in the extracted jar but may be needed by layouts
          mkdir -p app/src/main/res/values
          if ! grep -q "cornerlabel\|stateview" app/src/main/res/values/attrs.xml 2>/dev/null; then
            # Check if attrs.xml exists, if so append, else create
            cat >> app/src/main/res/values/attrs.xml << 'ATTRS' 2>/dev/null || cat > app/src/main/res/values/attrs.xml << 'ATTRS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <!-- StateView attrs (me.nukc.stateview kept in jar) -->
              <attr name="sv_emptyImage" format="reference" />
              <attr name="sv_emptyText" format="string" />
              <attr name="sv_loadingImage" format="reference" />
              <declare-styleable name="StateView">
                  <attr name="sv_emptyImage" />
                  <attr name="sv_emptyText" />
                  <attr name="sv_loadingImage" />
              </declare-styleable>
          </resources>
          ATTRS
          fi

      - name: Update settings.gradle
        run: |
          cat > settings.gradle << 'GRADLE'
          include ':app'
          rootProject.name = "VCamera"
          GRADLE

      - name: Update app/build.gradle
        run: |
          cat > app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application'
              id 'kotlin-android'
          }

          android {
              compileSdk rootProject.ext.compileSdkVersion

              defaultConfig {
                  applicationId rootProject.ext.masterPkg
                  minSdkVersion rootProject.ext.minSdkVersion
                  targetSdkVersion rootProject.ext.targetSdkVersion
                  versionCode rootProject.ext.versionCode
                  versionName rootProject.ext.versionName
              }

              buildTypes {
                  debug { minifyEnabled false }
                  release { minifyEnabled false }
              }

              buildFeatures { viewBinding true }
              kotlinOptions { jvmTarget = '1.8' }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              lintOptions {
                  checkReleaseBuilds false
                  abortOnError false
                  disable 'UnusedResources', 'RestrictedApi'
              }

              packagingOptions {
                  pickFirst 'META-INF/**'
                  pickFirst 'kotlin/**'
                  pickFirst '**/*.so'
              }
          }

          repositories {
              flatDir { dirs 'libs' }
              google()
              mavenCentral()
              maven { url 'https://jitpack.io' }
              maven { url "https://raw.githubusercontent.com/andvipgroup/CameraLib/master" }
          }

          dependencies {
              // Proprietary + JCenter-dead + unresolvable libs (kept as jar from APK DEX)
              // Includes: stateview, catloadinglibrary, floatingview, RVAdapter, billing, virtual.camera.*
              implementation fileTree(dir: "libs", include: ["*.jar", "*.aar"])

              // Standard Android (Google Maven)
              implementation 'com.google.android.material:material:1.3.0'
              implementation 'androidx.core:core-ktx:1.3.2'
              implementation 'androidx.appcompat:appcompat:1.3.0-rc01'
              implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
              implementation "androidx.recyclerview:recyclerview:1.2.0"
              implementation 'androidx.viewpager2:viewpager2:1.0.0'
              implementation "androidx.activity:activity-ktx:1.2.2"
              implementation "androidx.fragment:fragment-ktx:1.3.3"
              implementation "androidx.preference:preference-ktx:1.1.1"
              implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.4.2"
              implementation "androidx.lifecycle:lifecycle-viewmodel-ktx:2.3.1"
              implementation "androidx.lifecycle:lifecycle-livedata-ktx:2.3.1"
              implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.3.1"

              // MavenCentral
              implementation 'com.tbuonomo:dotsindicator:4.2'
              implementation 'org.osmdroid:osmdroid-android:6.1.11'

              // JitPack (AAR with classes + res/attrs.xml)
              implementation 'com.afollestad.material-dialogs:core:3.3.0'
              implementation 'com.afollestad.material-dialogs:input:3.3.0'
              implementation 'com.github.Ferfalk:SimpleSearchView:0.2.0'
              implementation 'com.github.Othershe:CornerLabelView:1.0.0'
          }
          GRADLE
          echo "app/build.gradle updated"

      - name: Setup Gradle wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.2'

      - name: Create gradlew
        run: |
          gradle wrapper --gradle-version=7.2
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VCamera-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: app/build/outputs/logs/
          retention-days: 7
