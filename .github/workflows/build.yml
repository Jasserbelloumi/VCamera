name: Decompile APK and Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  decompile-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;31.0.0" "platforms;android-33" || true

      - name: Install dex2jar
        run: |
          wget -q https://github.com/pxb1988/dex2jar/releases/download/v2.4/dex-tools-v2.4.zip
          unzip -q dex-tools-v2.4.zip
          chmod +x dex-tools-v2.4/d2j-dex2jar.sh

      - name: Extract everything from APK
        run: |
          APK_FILE="Virtual_Camera_Live_Assist_V3.5.0 (1).apk"
          mkdir -p apk_contents app/libs app/src/main/jniLibs

          # Extract APK
          unzip -q "$APK_FILE" -d apk_contents
          echo "=== APK top-level ==="
          ls apk_contents/

          # Convert ALL dex files to jars
          mkdir -p /tmp/merged_classes

          for dex in apk_contents/classes*.dex; do
            echo "Converting: $dex"
            ./dex-tools-v2.4/d2j-dex2jar.sh "$dex" -o /tmp/tmp_$(basename $dex .dex).jar --force 2>/dev/null || true
          done

          # Merge all jars into one temp directory
          for jar in /tmp/tmp_*.jar; do
            if [ -f "$jar" ]; then
              cd /tmp/merged_classes && jar xf "$jar" 2>/dev/null || true && cd -
            fi
          done

          # -------------------------------------------------------
          # TARGETED FIX: Remove ONLY packages that conflict with
          # Maven-resolvable dependencies (AndroidX, Material, Kotlin).
          # Keep all other classes (including JCenter-dead libs).
          # -------------------------------------------------------
          cd /tmp/merged_classes

          # Remove AndroidX (available via Google Maven)
          rm -rf android/ androidx/

          # Remove Google Material (available via Google Maven)
          rm -rf com/google/android/material/

          # Remove Kotlin stdlib/runtime (available via MavenCentral)
          rm -rf kotlin/ kotlinx/

          # Remove com.google.android.gms (available via Google Maven)
          rm -rf com/google/android/gms/
          rm -rf com/google/android/datatransport/

          # Remove META-INF (causes packaging issues)
          rm -rf META-INF/

          echo "=== Remaining custom classes (top-level packages) ==="
          find . -name "*.class" | sed 's|./||' | awk -F/ '{print $1"/"$2"/"$3}' | sort -u | head -50

          # Create filtered jar
          MERGED_JAR="$OLDPWD/app/libs/all-deps.jar"
          jar cf "$MERGED_JAR" . 2>/dev/null || true
          cd -
          echo "Custom JAR size: $(ls -lh app/libs/all-deps.jar | awk '{print $5}')"

          # Copy native .so libraries
          if [ -d "apk_contents/lib" ]; then
            for abi_dir in apk_contents/lib/*/; do
              abi=$(basename "$abi_dir")
              mkdir -p "app/src/main/jniLibs/$abi"
              cp "$abi_dir"*.so "app/src/main/jniLibs/$abi/" 2>/dev/null || true
            done
            echo "=== Native libs ==="
            find app/src/main/jniLibs -name "*.so"
          fi

      - name: Update settings.gradle
        run: |
          cat > settings.gradle << 'GRADLE'
          include ':app'
          rootProject.name = "VCamera"
          GRADLE

      - name: Update app/build.gradle
        run: |
          cat > app/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application'
              id 'kotlin-android'
          }

          android {
              compileSdk rootProject.ext.compileSdkVersion

              defaultConfig {
                  applicationId rootProject.ext.masterPkg
                  minSdkVersion rootProject.ext.minSdkVersion
                  targetSdkVersion rootProject.ext.targetSdkVersion
                  versionCode rootProject.ext.versionCode
                  versionName rootProject.ext.versionName
              }

              buildTypes {
                  debug { minifyEnabled false }
                  release { minifyEnabled false }
              }

              buildFeatures {
                  viewBinding true
              }

              kotlinOptions { jvmTarget = '1.8' }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              lintOptions {
                  checkReleaseBuilds false
                  abortOnError false
                  disable 'UnusedResources', 'RestrictedApi'
              }

              packagingOptions {
                  pickFirst 'META-INF/**'
                  pickFirst 'kotlin/**'
                  pickFirst '**/*.so'
              }
          }

          // Explicit repositories (override dead jcenter)
          repositories {
              flatDir { dirs 'libs' }
              google()
              mavenCentral()
              maven { url 'https://jitpack.io' }
              maven { url "https://raw.githubusercontent.com/andvipgroup/CameraLib/master" }
          }

          dependencies {
              // Custom classes from APK (proprietary + JCenter-dead libs kept in jar)
              implementation fileTree(dir: "libs", include: ["*.jar", "*.aar"])

              // Standard Android deps - REMOVED from jar, resolved via Google Maven
              implementation 'com.google.android.material:material:1.3.0'
              implementation 'androidx.core:core-ktx:1.3.2'
              implementation 'androidx.appcompat:appcompat:1.3.0-rc01'
              implementation 'androidx.constraintlayout:constraintlayout:2.0.4'
              implementation "androidx.recyclerview:recyclerview:1.2.0"
              implementation 'androidx.viewpager2:viewpager2:1.0.0'
              implementation "androidx.activity:activity-ktx:1.2.2"
              implementation "androidx.fragment:fragment-ktx:1.3.3"
              implementation "androidx.preference:preference-ktx:1.1.1"
              implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.4.2"
              implementation "androidx.lifecycle:lifecycle-viewmodel-ktx:2.3.1"
              implementation "androidx.lifecycle:lifecycle-livedata-ktx:2.3.1"
              implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.3.1"

              // Third-party deps available via MavenCentral/JitPack (REMOVED from jar)
              implementation 'com.tbuonomo:dotsindicator:4.2'
              implementation 'com.afollestad.material-dialogs:core:3.3.0'
              implementation 'com.afollestad.material-dialogs:input:3.3.0'
              implementation 'org.osmdroid:osmdroid-android:6.1.11'

              // NOTE: catloadinglibrary, floatingview, stateview, SimpleSearchView,
              // CornerLabelView, RVAdapter are kept in all-deps.jar (JCenter dead or gitee)
          }
          GRADLE
          echo "app/build.gradle updated"

      - name: Setup Gradle wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.2'

      - name: Create gradlew
        run: |
          gradle wrapper --gradle-version=7.2
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VCamera-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: app/build/outputs/logs/
          retention-days: 7
