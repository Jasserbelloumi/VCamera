name: Decompile APK and Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  decompile-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;31.0.0" "platforms;android-33" || true

      - name: Download jadx
        run: |
          wget -q https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip -q jadx-1.5.0.zip -d jadx
          chmod +x jadx/bin/jadx

      - name: Download apktool
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar

      - name: Decompile APK with jadx
        run: |
          APK_FILE="Virtual_Camera_Live_Assist_V3.5.0 (1).apk"
          mkdir -p jadx_output
          ./jadx/bin/jadx --deobf --show-bad-code -d jadx_output "$APK_FILE" 2>&1 | tail -5 || true
          echo "Packages found:"
          find jadx_output/sources -maxdepth 2 -type d 2>/dev/null | head -20 || true

      - name: Extract APK native libs with apktool
        run: |
          APK_FILE="Virtual_Camera_Live_Assist_V3.5.0 (1).apk"
          java -jar apktool.jar d "$APK_FILE" -o apktool_output -f 2>&1 | tail -5 || true
          echo "Native libs found:"
          find apktool_output/lib -name "*.so" 2>/dev/null | head -20 || true

      - name: Build opensdk module from decompiled code
        run: |
          mkdir -p opensdk/src/main/java
          mkdir -p opensdk/src/main/jniLibs

          # Copy all decompiled sources except the main app package
          if [ -d "jadx_output/sources" ]; then
            find jadx_output/sources -mindepth 1 -maxdepth 1 -type d | while read pkg_dir; do
              cp -r "$pkg_dir" "opensdk/src/main/java/" 2>/dev/null || true
            done
            # Remove app-specific code — keep only SDK parts
            rm -rf opensdk/src/main/java/virtual/camera/app 2>/dev/null || true
          fi

          # Copy native .so libraries
          if [ -d "apktool_output/lib" ]; then
            for abi_dir in apktool_output/lib/*/; do
              abi=$(basename "$abi_dir")
              mkdir -p "opensdk/src/main/jniLibs/$abi"
              cp "$abi_dir"*.so "opensdk/src/main/jniLibs/$abi/" 2>/dev/null || true
            done
          fi

          echo "opensdk module contents:"
          find opensdk -type f | head -30

      - name: Create opensdk build.gradle
        run: |
          cat > opensdk/build.gradle << 'GRADLE'
          apply plugin: 'com.android.library'
          apply plugin: 'kotlin-android'

          android {
              compileSdkVersion rootProject.ext.compileSdkVersion

              defaultConfig {
                  minSdkVersion rootProject.ext.minSdkVersion
                  targetSdkVersion rootProject.ext.targetSdkVersion
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              lintOptions {
                  abortOnError false
                  disable 'all'
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.3.0-rc01'
              implementation 'com.google.android.material:material:1.3.0'
              implementation 'androidx.core:core-ktx:1.3.2'
          }
          GRADLE

      - name: Create opensdk AndroidManifest
        run: |
          cat > opensdk/src/main/AndroidManifest.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="virtual.camera.opensdk">
          </manifest>
          XML

      - name: Setup Gradle wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.2'

      - name: Create gradlew
        run: |
          gradle wrapper --gradle-version=7.2
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --stacktrace 2>&1 | tail -60

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VCamera-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: app/build/outputs/logs/
          retention-days: 7
