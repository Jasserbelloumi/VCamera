name: Decompile APK and Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  decompile-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;31.0.0" "platforms;android-33" || true

      - name: Install dex2jar
        run: |
          wget -q https://github.com/pxb1988/dex2jar/releases/download/v2.4/dex-tools-v2.4.zip
          unzip -q dex-tools-v2.4.zip
          chmod +x dex-tools-v2.4/d2j-dex2jar.sh

      - name: Extract JAR and native libs from APK
        run: |
          APK_FILE="Virtual_Camera_Live_Assist_V3.5.0 (1).apk"

          # APK is a ZIP - extract it
          mkdir -p apk_contents
          unzip -q "$APK_FILE" -d apk_contents

          echo "=== APK contents ==="
          ls apk_contents/

          # Convert dex to jar
          mkdir -p app/libs
          ./dex-tools-v2.4/d2j-dex2jar.sh apk_contents/classes.dex -o app/libs/opensdk.jar --force || true
          
          # Try other dex files if they exist
          for dex in apk_contents/classes*.dex; do
            name=$(basename $dex .dex)
            ./dex-tools-v2.4/d2j-dex2jar.sh "$dex" -o "app/libs/${name}.jar" --force || true
          done

          echo "=== JARs created ==="
          ls -la app/libs/

          # Extract native .so files
          mkdir -p app/src/main/jniLibs
          if [ -d "apk_contents/lib" ]; then
            cp -r apk_contents/lib/* app/src/main/jniLibs/ || true
            echo "=== Native libs ==="
            find app/src/main/jniLibs -name "*.so" | head -15
          fi

      - name: Update settings.gradle to remove opensdk module
        run: |
          cat > settings.gradle << 'GRADLE'
          include ':app'
          rootProject.name = "VCamera"
          GRADLE
          echo "settings.gradle updated - removed opensdk module"

      - name: Update app build.gradle to use jar libs instead of opensdk project
        run: |
          # Replace 'implementation project(:opensdk)' with fileTree
          sed -i "s|implementation project(':opensdk')|// implementation project(':opensdk') -- replaced with compiled jar|g" app/build.gradle
          echo "app/build.gradle updated"
          grep -n "opensdk" app/build.gradle || echo "opensdk reference removed"

      - name: Setup Gradle wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '7.2'

      - name: Create gradlew
        run: |
          gradle wrapper --gradle-version=7.2
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VCamera-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: app/build/outputs/logs/
          retention-days: 7
